name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate_tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      is_valid: ${{ steps.check.outputs.is_valid }}
    steps:
      - name: Check tag format
        id: check
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_valid=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG matches stable SemVer."
          else
            echo "is_valid=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not match stable SemVer, skip release."
          fi

  build:
    name: Build (${{ matrix.label }})
    needs: validate_tag
    if: needs.validate_tag.outputs.is_valid == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Universal
            os: macos-latest
            build_cmd: npm run build:mac
          - label: Windows NSIS
            os: windows-latest
            build_cmd: npm run build:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install root dependencies
        run: npm ci

      - name: Build desktop bundle
        run: ${{ matrix.build_cmd }}

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Create/Update Release
    needs: [validate_tag, build]
    if: needs.validate_tag.outputs.is_valid == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Show artifacts
        run: ls -R release-artifacts

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          commit: ${{ github.sha }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          replacesArtifacts: true
          artifacts: "release-artifacts/**/*.dmg,release-artifacts/**/*.exe"
